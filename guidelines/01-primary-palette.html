<!-- @dsCard group="Colors" viewport="700x180" subtitle="Core blues and gold from tokens/colors.css." name="Primary Palette" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../styles.css">
  <title>Primary Palette</title>
</head>
<body>
  <main class="ds-card">
    <header class="ds-card__header">
      <p class="ds-eyebrow">Colors</p>
      <h1 class="ds-title">Primary Palette</h1>
      <p class="ds-subtitle">Core blues and gold from tokens/colors.css.</p>
    </header>
    <div class="swatches">
  <div class="swatch"><div class="swatch__chip" style="background:var(--wv-navy-950)"></div><span class="ds-name">Navy 950</span><span class="ds-value">--wv-navy-950</span></div>
  <div class="swatch"><div class="swatch__chip" style="background:var(--wv-navy-900)"></div><span class="ds-name">Navy 900</span><span class="ds-value">--wv-navy-900</span></div>
  <div class="swatch"><div class="swatch__chip" style="background:var(--wv-blue-700)"></div><span class="ds-name">Blue 700</span><span class="ds-value">--wv-blue-700</span></div>
  <div class="swatch"><div class="swatch__chip" style="background:var(--wv-blue-500)"></div><span class="ds-name">Blue 500</span><span class="ds-value">--wv-blue-500</span></div>
  <div class="swatch"><div class="swatch__chip" style="background:var(--wv-gold-400)"></div><span class="ds-name">Gold 400</span><span class="ds-value">--wv-gold-400</span></div>
</div>
  </main>
</body>
</html>
