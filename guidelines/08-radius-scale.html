<!-- @dsCard group="Foundations" viewport="700x180" subtitle="Corner radius choices from subtle to pill." name="Radius Scale" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../styles.css">
  <title>Radius Scale</title>
</head>
<body>
  <main class="ds-card">
    <header class="ds-card__header">
      <p class="ds-eyebrow">Foundations</p>
      <h1 class="ds-title">Radius Scale</h1>
      <p class="ds-subtitle">Corner radius choices from subtle to pill.</p>
    </header>
    <div class="spec-grid"><div class="spec" style="border-radius:var(--wv-radius-sm)"><span class="ds-value">--wv-radius-sm</span></div><div class="spec" style="border-radius:var(--wv-radius-md)"><span class="ds-value">--wv-radius-md</span></div><div class="spec" style="border-radius:var(--wv-radius-lg)"><span class="ds-value">--wv-radius-lg</span></div><div class="spec" style="border-radius:var(--wv-radius-pill)"><span class="ds-value">--wv-radius-pill</span></div></div>
  </main>
</body>
</html>
