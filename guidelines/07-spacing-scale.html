<!-- @dsCard group="Foundations" viewport="700x180" subtitle="Compact spacing tokens for cards and layouts." name="Spacing Scale" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../styles.css">
  <title>Spacing Scale</title>
</head>
<body>
  <main class="ds-card">
    <header class="ds-card__header">
      <p class="ds-eyebrow">Foundations</p>
      <h1 class="ds-title">Spacing Scale</h1>
      <p class="ds-subtitle">Compact spacing tokens for cards and layouts.</p>
    </header>
    <div class="spec-grid"><div class="spec"><div style="height:18px;width:var(--wv-space-1);background:var(--wv-blue-700);border-radius:4px"></div><span class="ds-value">--wv-space-1</span></div><div class="spec"><div style="height:18px;width:var(--wv-space-2);background:var(--wv-blue-700);border-radius:4px"></div><span class="ds-value">--wv-space-2</span></div><div class="spec"><div style="height:18px;width:var(--wv-space-3);background:var(--wv-blue-700);border-radius:4px"></div><span class="ds-value">--wv-space-3</span></div><div class="spec"><div style="height:18px;width:var(--wv-space-4);background:var(--wv-blue-700);border-radius:4px"></div><span class="ds-value">--wv-space-4</span></div><div class="spec"><div style="height:18px;width:var(--wv-space-6);background:var(--wv-blue-700);border-radius:4px"></div><span class="ds-value">--wv-space-6</span></div><div class="spec"><div style="height:18px;width:var(--wv-space-8);background:var(--wv-blue-700);border-radius:4px"></div><span class="ds-value">--wv-space-8</span></div></div>
  </main>
</body>
</html>
