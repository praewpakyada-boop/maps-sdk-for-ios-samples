<!-- @dsCard group="Colors" viewport="700x180" subtitle="Ink, slate, white, and glass neutrals." name="Neutral Palette" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../styles.css">
  <title>Neutral Palette</title>
</head>
<body>
  <main class="ds-card">
    <header class="ds-card__header">
      <p class="ds-eyebrow">Colors</p>
      <h1 class="ds-title">Neutral Palette</h1>
      <p class="ds-subtitle">Ink, slate, white, and glass neutrals.</p>
    </header>
    <div class="swatches">
  <div class="swatch"><div class="swatch__chip" style="background:var(--wv-ink)"></div><span class="ds-name">Ink</span><span class="ds-value">--wv-ink</span></div>
  <div class="swatch"><div class="swatch__chip" style="background:var(--wv-slate-600)"></div><span class="ds-name">Slate 600</span><span class="ds-value">--wv-slate-600</span></div>
  <div class="swatch"><div class="swatch__chip" style="background:var(--wv-slate-200)"></div><span class="ds-name">Slate 200</span><span class="ds-value">--wv-slate-200</span></div>
  <div class="swatch"><div class="swatch__chip" style="background:var(--wv-white)"></div><span class="ds-name">White</span><span class="ds-value">--wv-white</span></div>
  <div class="swatch"><div class="swatch__chip" style="background:var(--wv-glass)"></div><span class="ds-name">Glass</span><span class="ds-value">--wv-glass</span></div>
</div>
  </main>
</body>
</html>
