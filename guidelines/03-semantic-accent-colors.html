<!-- @dsCard group="Colors" viewport="700x180" subtitle="Accent and semantic usage pairings." name="Semantic & Accent Colors" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../styles.css">
  <title>Semantic & Accent Colors</title>
</head>
<body>
  <main class="ds-card">
    <header class="ds-card__header">
      <p class="ds-eyebrow">Colors</p>
      <h1 class="ds-title">Semantic & Accent Colors</h1>
      <p class="ds-subtitle">Accent and semantic usage pairings.</p>
    </header>
    <div class="swatches">
  <div class="swatch"><div class="swatch__chip" style="background:var(--wv-blue-700)"></div><span class="ds-name">Action</span><span class="ds-value">primary CTA</span></div>
  <div class="swatch"><div class="swatch__chip" style="background:var(--wv-cyan-300)"></div><span class="ds-name">Highlight</span><span class="ds-value">map glow</span></div>
  <div class="swatch"><div class="swatch__chip" style="background:var(--wv-gold-400)"></div><span class="ds-name">Premium</span><span class="ds-value">brand accent</span></div>
  <div class="swatch"><div class="swatch__chip" style="background:var(--wv-shadow)"></div><span class="ds-name">Scrim</span><span class="ds-value">shadow overlay</span></div>
</div>
  </main>
</body>
</html>
